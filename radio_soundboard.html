
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@400;500;600&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body { background: transparent; }

  #app {
    font-family: 'DM Sans', sans-serif;
    color: var(--color-text-primary);
    padding: 1rem 0;
    min-height: 500px;
  }

  #toolbar {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 1.25rem;
    flex-wrap: wrap;
  }

  #toolbar h2 {
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--color-text-secondary);
    margin-right: auto;
  }

  .btn {
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    padding: 7px 14px;
    border-radius: var(--border-radius-md);
    border: 0.5px solid var(--color-border-secondary);
    background: var(--color-background-primary);
    color: var(--color-text-primary);
    cursor: pointer;
    transition: background 0.12s, transform 0.08s;
  }
  .btn:hover { background: var(--color-background-secondary); }
  .btn:active { transform: scale(0.97); }
  .btn.danger { border-color: #E24B4A; color: #E24B4A; }
  .btn.danger:hover { background: #FCEBEB; }

  #grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 10px;
  }

  .pad {
    position: relative;
    border-radius: var(--border-radius-lg);
    border: 0.5px solid var(--color-border-tertiary);
    background: var(--color-background-primary);
    padding: 14px 12px 12px;
    cursor: pointer;
    transition: border-color 0.1s, background 0.1s, transform 0.08s;
    user-select: none;
    min-height: 100px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    overflow: hidden;
  }

  .pad:hover {
    border-color: var(--color-border-primary);
    background: var(--color-background-secondary);
  }

  .pad.playing {
    border-color: #1D9E75;
    background: #E1F5EE;
    transform: scale(0.97);
  }

  .pad.empty {
    border-style: dashed;
    cursor: default;
    opacity: 0.5;
  }

  .pad.empty:hover { background: var(--color-background-primary); border-color: var(--color-border-secondary); }

  .pad-key {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    font-weight: 700;
    color: var(--color-text-tertiary);
    background: var(--color-background-secondary);
    border: 0.5px solid var(--color-border-tertiary);
    border-radius: 4px;
    width: 22px;
    height: 22px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .pad.playing .pad-key {
    background: #9FE1CB;
    border-color: #5DCAA5;
    color: #085041;
  }

  .pad-name {
    font-size: 13px;
    font-weight: 500;
    color: var(--color-text-primary);
    word-break: break-word;
    line-height: 1.3;
    margin-top: 8px;
  }

  .pad-name.unloaded {
    font-size: 12px;
    color: var(--color-text-tertiary);
    font-weight: 400;
  }

  .pad-bottom {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 10px;
  }

  .pad-duration {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: var(--color-text-tertiary);
  }

  .pad-actions {
    display: flex;
    gap: 4px;
    opacity: 0;
    transition: opacity 0.1s;
  }

  .pad:hover .pad-actions { opacity: 1; }

  .pad-btn {
    font-size: 10px;
    padding: 3px 7px;
    border-radius: 4px;
    border: 0.5px solid var(--color-border-tertiary);
    background: var(--color-background-secondary);
    color: var(--color-text-secondary);
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-weight: 500;
    transition: background 0.1s;
  }
  .pad-btn:hover { background: var(--color-background-primary); border-color: var(--color-border-secondary); }
  .pad-btn.del { color: #E24B4A; }
  .pad-btn.del:hover { background: #FCEBEB; border-color: #F7C1C1; }

  .waveform-bar {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 3px;
    background: #1D9E75;
    transform-origin: left;
    transform: scaleX(0);
    transition: none;
    border-radius: 0 0 12px 12px;
  }

  .pad.playing .waveform-bar {
    animation: progress-anim var(--dur, 3s) linear forwards;
  }

  @keyframes progress-anim {
    from { transform: scaleX(0); }
    to { transform: scaleX(1); }
  }

  #volume-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-top: 1rem;
    padding-top: 1rem;
    border-top: 0.5px solid var(--color-border-tertiary);
  }

  #volume-row label {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--color-text-secondary);
    white-space: nowrap;
  }

  #vol-out {
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    color: var(--color-text-secondary);
    min-width: 36px;
    text-align: right;
  }

  #status {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: #1D9E75;
    margin-left: auto;
    min-height: 16px;
    letter-spacing: 0.04em;
  }

  #drop-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(29,158,117,0.12);
    border: 3px dashed #1D9E75;
    z-index: 100;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    font-weight: 500;
    color: #1D9E75;
    pointer-events: none;
  }
  #drop-overlay.show { display: flex; }

  #rename-modal {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.35);
    z-index: 200;
    align-items: center;
    justify-content: center;
  }
  #rename-modal.show { display: flex; }
  #rename-box {
    background: var(--color-background-primary);
    border-radius: var(--border-radius-lg);
    border: 0.5px solid var(--color-border-secondary);
    padding: 20px 24px;
    width: 280px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  #rename-box h3 {
    font-size: 15px;
    font-weight: 500;
    color: var(--color-text-primary);
  }
  #rename-input {
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    padding: 8px 10px;
    border-radius: var(--border-radius-md);
    border: 0.5px solid var(--color-border-secondary);
    background: var(--color-background-secondary);
    color: var(--color-text-primary);
    outline: none;
    width: 100%;
  }
  #rename-input:focus { border-color: #1D9E75; }
  .modal-btns { display: flex; gap: 8px; justify-content: flex-end; }

  input[type=file] { display: none; }
</style>

<div id="app">
  <div id="toolbar">
    <h2>&#9679; Soundboard</h2>
    <button class="btn" id="load-btn">+ Load sounds</button>
    <button class="btn danger" id="stop-all-btn">&#9632; Stop all</button>
    <span id="status"></span>
  </div>

  <div id="grid"></div>

  <div id="volume-row">
    <label>Master vol</label>
    <input type="range" id="vol-slider" min="0" max="100" value="80" style="flex:1; max-width:180px;">
    <span id="vol-out">80%</span>
  </div>
</div>

<div id="drop-overlay">Drop audio files to add sounds</div>

<div id="rename-modal">
  <div id="rename-box">
    <h3>Rename pad</h3>
    <input type="text" id="rename-input" maxlength="32" />
    <div class="modal-btns">
      <button class="btn" id="rename-cancel">Cancel</button>
      <button class="btn" id="rename-ok">Save</button>
    </div>
  </div>
</div>

<input type="file" id="file-input" accept="audio/*" multiple>

<script>
(function() {
  const KEYS = 'qwertyuiopasdfghjklzxcvbnm1234567890'.split('');
  const MAX_PADS = 36;

  const ctx = new (window.AudioContext || window.webkitAudioContext)();
  let masterGain = ctx.createGain();
  masterGain.gain.value = 0.8;
  masterGain.connect(ctx.destination);

  let pads = KEYS.map(k => ({ key: k, name: null, buffer: null, duration: 0, source: null, playing: false, startTime: 0 }));

  const grid = document.getElementById('grid');
  const fileInput = document.getElementById('file-input');
  const loadBtn = document.getElementById('load-btn');
  const stopAllBtn = document.getElementById('stop-all-btn');
  const volSlider = document.getElementById('vol-slider');
  const volOut = document.getElementById('vol-out');
  const status = document.getElementById('status');
  const dropOverlay = document.getElementById('drop-overlay');
  const renameModal = document.getElementById('rename-modal');
  const renameInput = document.getElementById('rename-input');
  const renameCancelBtn = document.getElementById('rename-cancel');
  const renameOkBtn = document.getElementById('rename-ok');

  let renamePadIndex = -1;
  let statusTimer = null;

  function showStatus(msg, dur = 1800) {
    status.textContent = msg;
    clearTimeout(statusTimer);
    statusTimer = setTimeout(() => status.textContent = '', dur);
  }

  function formatDur(s) {
    if (!s) return '';
    const m = Math.floor(s / 60);
    const sec = Math.floor(s % 60);
    return m > 0 ? m + ':' + String(sec).padStart(2,'0') : sec + 's';
  }

  function render() {
    grid.innerHTML = '';
    pads.forEach((pad, i) => {
      const el = document.createElement('div');
      el.className = 'pad' + (pad.buffer ? '' : ' empty') + (pad.playing ? ' playing' : '');
      if (pad.playing && pad.duration > 0) {
        el.style.setProperty('--dur', pad.duration + 's');
      }

      const keyEl = document.createElement('div');
      keyEl.className = 'pad-key';
      keyEl.textContent = pad.key.toUpperCase();

      const nameEl = document.createElement('div');
      nameEl.className = 'pad-name' + (pad.buffer ? '' : ' unloaded');
      nameEl.textContent = pad.buffer ? pad.name : 'empty';

      const bottom = document.createElement('div');
      bottom.className = 'pad-bottom';

      const durEl = document.createElement('div');
      durEl.className = 'pad-duration';
      durEl.textContent = pad.buffer ? formatDur(pad.duration) : '';

      const actEl = document.createElement('div');
      actEl.className = 'pad-actions';

      if (pad.buffer) {
        const renBtn = document.createElement('button');
        renBtn.className = 'pad-btn';
        renBtn.textContent = 'rename';
        renBtn.addEventListener('click', e => { e.stopPropagation(); openRename(i); });

        const delBtn = document.createElement('button');
        delBtn.className = 'pad-btn del';
        delBtn.textContent = 'clear';
        delBtn.addEventListener('click', e => { e.stopPropagation(); clearPad(i); });

        actEl.append(renBtn, delBtn);

        const wave = document.createElement('div');
        wave.className = 'waveform-bar';
        el.appendChild(wave);

        el.addEventListener('click', () => triggerPad(i));
      } else {
        const addBtn = document.createElement('button');
        addBtn.className = 'pad-btn';
        addBtn.textContent = '+ load';
        addBtn.addEventListener('click', e => { e.stopPropagation(); loadForPad(i); });
        actEl.append(addBtn);
      }

      bottom.append(durEl, actEl);
      el.append(keyEl, nameEl, bottom);
      grid.appendChild(el);
    });
  }

  function triggerPad(i) {
    const pad = pads[i];
    if (!pad.buffer) return;
    if (ctx.state === 'suspended') ctx.resume();

    if (pad.source) {
      try { pad.source.stop(); } catch(e) {}
      pad.source = null;
    }

    const src = ctx.createBufferSource();
    src.buffer = pad.buffer;
    src.connect(masterGain);
    src.start(0);
    pad.source = src;
    pad.playing = true;
    pad.startTime = ctx.currentTime;

    src.onended = () => {
      if (pad.source === src) {
        pad.playing = false;
        pad.source = null;
        render();
      }
    };

    showStatus('▶ ' + pad.name);
    render();
  }

  function clearPad(i) {
    const pad = pads[i];
    if (pad.source) { try { pad.source.stop(); } catch(e) {} pad.source = null; }
    pad.buffer = null; pad.name = null; pad.duration = 0; pad.playing = false;
    render();
  }

  function openRename(i) {
    renamePadIndex = i;
    renameInput.value = pads[i].name || '';
    renameModal.classList.add('show');
    renameInput.focus();
    renameInput.select();
  }

  renameCancelBtn.addEventListener('click', () => renameModal.classList.remove('show'));
  renameOkBtn.addEventListener('click', () => {
    if (renamePadIndex >= 0 && renameInput.value.trim()) {
      pads[renamePadIndex].name = renameInput.value.trim();
    }
    renameModal.classList.remove('show');
    render();
  });
  renameInput.addEventListener('keydown', e => {
    if (e.key === 'Enter') renameOkBtn.click();
    if (e.key === 'Escape') renameCancelBtn.click();
  });

  function loadForPad(i) {
    const tmp = document.createElement('input');
    tmp.type = 'file'; tmp.accept = 'audio/*';
    tmp.addEventListener('change', e => {
      const file = e.target.files[0];
      if (file) loadFile(file, i);
    });
    tmp.click();
  }

  async function loadFile(file, padIndex) {
    const reader = new FileReader();
    reader.onload = async (e) => {
      try {
        const buf = await ctx.decodeAudioData(e.target.result.slice(0));
        pads[padIndex].buffer = buf;
        pads[padIndex].duration = buf.duration;
        pads[padIndex].name = file.name.replace(/\.[^.]+$/, '');
        showStatus('Loaded → ' + pads[padIndex].key.toUpperCase());
        render();
      } catch(err) {
        showStatus('Error loading file');
      }
    };
    reader.readAsArrayBuffer(file);
  }

  async function loadFiles(files) {
    let nextEmpty = pads.findIndex(p => !p.buffer);
    for (const file of files) {
      if (nextEmpty >= MAX_PADS) break;
      await new Promise(resolve => {
        const reader = new FileReader();
        reader.onload = async (e) => {
          try {
            const buf = await ctx.decodeAudioData(e.target.result.slice(0));
            pads[nextEmpty].buffer = buf;
            pads[nextEmpty].duration = buf.duration;
            pads[nextEmpty].name = file.name.replace(/\.[^.]+$/, '');
            nextEmpty = pads.findIndex((p, idx) => !p.buffer && idx > nextEmpty - 1);
            if (nextEmpty < 0) nextEmpty = MAX_PADS;
          } catch(e) {}
          resolve();
        };
        reader.readAsArrayBuffer(file);
      });
    }
    render();
    showStatus('Loaded ' + files.length + ' sound' + (files.length > 1 ? 's' : ''));
  }

  loadBtn.addEventListener('click', () => fileInput.click());
  fileInput.addEventListener('change', e => {
    if (e.target.files.length) loadFiles(Array.from(e.target.files));
    fileInput.value = '';
  });

  stopAllBtn.addEventListener('click', () => {
    pads.forEach(p => {
      if (p.source) { try { p.source.stop(); } catch(e) {} p.source = null; }
      p.playing = false;
    });
    render();
  });

  volSlider.addEventListener('input', () => {
    const v = parseInt(volSlider.value);
    masterGain.gain.value = v / 100;
    volOut.textContent = v + '%';
  });

  document.addEventListener('keydown', e => {
    if (e.target.tagName === 'INPUT') return;
    const key = e.key.toLowerCase();
    const i = KEYS.indexOf(key);
    if (i >= 0 && pads[i].buffer) {
      e.preventDefault();
      triggerPad(i);
    }
  });

  let dragCount = 0;
  document.addEventListener('dragenter', e => { e.preventDefault(); dragCount++; dropOverlay.classList.add('show'); });
  document.addEventListener('dragleave', e => { dragCount--; if (dragCount <= 0) { dragCount = 0; dropOverlay.classList.remove('show'); } });
  document.addEventListener('dragover', e => e.preventDefault());
  document.addEventListener('drop', e => {
    e.preventDefault(); dragCount = 0; dropOverlay.classList.remove('show');
    const files = Array.from(e.dataTransfer.files).filter(f => f.type.startsWith('audio/'));
    if (files.length) loadFiles(files);
  });

  render();
})();
</script>
