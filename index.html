<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Soundboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:       #0e0e0c;
  --bg2:      #161614;
  --bg3:      #1e1e1b;
  --bg4:      #252522;
  --line:     rgba(255,255,255,0.06);
  --line2:    rgba(255,255,255,0.12);
  --line3:    rgba(255,255,255,0.22);
  --text:     #f0ede6;
  --text2:    #8a8880;
  --text3:    #4a4845;
  --amber:    #e8a030;
  --amber2:   #c47a10;
  --amber-bg: rgba(232,160,48,0.1);
  --red:      #d94040;
  --red-bg:   rgba(217,64,64,0.12);
  --green:    #2db87a;
  --radius:   10px;
  --radius-lg: 14px;
}

html { background: var(--bg); }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.025) 2px, rgba(0,0,0,0.025) 4px);
  pointer-events: none;
  z-index: 999;
}

#header {
  border-bottom: 1px solid var(--line);
  padding: 16px 28px;
  display: flex;
  align-items: center;
  gap: 20px;
}

#logo {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 26px;
  letter-spacing: 0.12em;
  color: var(--amber);
  line-height: 1;
}

#logo span {
  color: var(--text3);
  font-size: 11px;
  font-family: 'IBM Plex Mono', monospace;
  letter-spacing: 0.1em;
  display: block;
  margin-top: 2px;
}

#on-air {
  display: flex;
  align-items: center;
  gap: 7px;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.2em;
  color: var(--text3);
  text-transform: uppercase;
  margin-left: auto;
  transition: color 0.3s;
}
#on-air.active { color: var(--red); }

#on-air-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--text3);
  transition: background 0.3s, box-shadow 0.3s;
}
#on-air-dot.active {
  background: var(--red);
  box-shadow: 0 0 8px var(--red);
  animation: blink 1.2s ease-in-out infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.35} }

#main { padding: 22px 28px 32px; max-width: 1100px; margin: 0 auto; }

#controls {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 20px;
  flex-wrap: wrap;
}

#status-bar {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 11px;
  color: var(--amber);
  margin-left: auto;
  min-width: 160px;
  text-align: right;
  letter-spacing: 0.05em;
  opacity: 0;
  transition: opacity 0.2s;
}
#status-bar.visible { opacity: 1; }

.btn {
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  font-weight: 500;
  padding: 8px 16px;
  border-radius: 6px;
  border: 1px solid var(--line2);
  background: var(--bg3);
  color: var(--text2);
  cursor: pointer;
  transition: all 0.15s;
}
.btn:hover { background: var(--bg4); border-color: var(--line3); color: var(--text); }
.btn:active { transform: scale(0.97); }
.btn.primary { background: var(--amber-bg); border-color: var(--amber2); color: var(--amber); }
.btn.primary:hover { background: rgba(232,160,48,0.18); border-color: var(--amber); }
.btn.stop { background: var(--red-bg); border-color: rgba(217,64,64,0.4); color: var(--red); }
.btn.stop:hover { background: rgba(217,64,64,0.2); }

#vol-group {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-left: 8px;
}
#vol-group label {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--text3);
  white-space: nowrap;
}
input[type=range] {
  -webkit-appearance: none; appearance: none;
  width: 100px; height: 3px;
  border-radius: 2px;
  background: var(--bg4);
  outline: none; cursor: pointer;
}
input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 13px; height: 13px;
  border-radius: 50%;
  background: var(--amber);
  border: 2px solid var(--bg);
  cursor: pointer;
  transition: transform 0.1s;
}
input[type=range]::-webkit-slider-thumb:hover { transform: scale(1.2); }
#vol-out { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--text2); min-width: 32px; }

.pad-mode-pill {
  display: flex;
  align-items: center;
  border: 1px solid var(--line2);
  border-radius: 4px;
  overflow: hidden;
  flex-shrink: 0;
}
.pad-mode-opt {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 8px;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  padding: 3px 6px;
  background: transparent;
  color: var(--text3);
  border: none;
  cursor: pointer;
  transition: all 0.12s;
  line-height: 1;
}
.pad-mode-opt:hover { color: var(--text2); background: var(--bg4); }
.pad-mode-opt.active { background: var(--amber-bg); color: var(--amber); }
.pad-mode-sep { width: 1px; background: var(--line2); align-self: stretch; }

#section-label {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--text3);
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 12px;
}
#section-label::after { content:''; flex:1; height:1px; background:var(--line); }

#grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(152px, 1fr));
  gap: 6px;
}

.pad {
  position: relative;
  border-radius: var(--radius);
  border: 1px solid var(--line);
  background: var(--bg2);
  padding: 11px 11px 9px;
  cursor: pointer;
  transition: border-color 0.12s, background 0.12s, transform 0.08s, box-shadow 0.12s;
  user-select: none;
  display: flex;
  flex-direction: column;
  gap: 7px;
  overflow: hidden;
}
.pad:hover { border-color: var(--line2); background: var(--bg3); box-shadow: 0 2px 14px rgba(0,0,0,0.5); }
.pad.playing { border-color: var(--amber2); background: var(--bg3); box-shadow: 0 0 0 1px var(--amber2), 0 4px 24px rgba(232,160,48,0.12); transform: scale(0.98); }
.pad.empty { border-style: dashed; border-color: var(--line); background: transparent; cursor: default; opacity: 0.3; }
.pad.empty:hover { background: transparent; border-color: var(--line2); box-shadow: none; opacity: 0.45; }

.pad-top { display: flex; align-items: center; gap: 8px; }
.pad-key {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 9px; font-weight: 600;
  color: var(--text3);
  background: var(--bg4);
  border: 1px solid var(--line2);
  border-radius: 4px;
  width: 17px; height: 17px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  transition: all 0.15s;
}
.pad.playing .pad-key { color: var(--amber); border-color: var(--amber2); background: var(--amber-bg); }

.pad-name { font-size: 12px; font-weight: 500; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; }
.pad-name.unloaded { font-size: 11px; color: var(--text3); font-weight: 300; font-style: italic; }

.pad-wave { width: 100%; height: 28px; display: block; opacity: 0.6; transition: opacity 0.15s; }
.pad:hover .pad-wave, .pad.playing .pad-wave { opacity: 1; }

.pad-bottom { display: flex; align-items: center; justify-content: space-between; }
.pad-duration { font-family: 'IBM Plex Mono', monospace; font-size: 9px; color: var(--text3); letter-spacing: 0.04em; }
.pad.playing .pad-duration { color: var(--amber); }

.pad-actions { display: flex; gap: 3px; opacity: 0; transition: opacity 0.12s; }
.pad:hover .pad-actions { opacity: 1; }
.pad-btn { font-size: 9px; padding: 2px 6px; border-radius: 4px; border: 1px solid var(--line2); background: var(--bg4); color: var(--text3); cursor: pointer; font-family: 'IBM Plex Mono', monospace; transition: all 0.1s; }
.pad-btn:hover { background: var(--bg3); color: var(--text2); border-color: var(--line3); }
.pad-btn.del { color: var(--red); }
.pad-btn.del:hover { background: var(--red-bg); border-color: rgba(217,64,64,0.4); }

.progress-bar { position: absolute; bottom:0; left:0; right:0; height:2px; background:var(--amber); transform-origin:left; transform:scaleX(0); border-radius:0 0 10px 10px; }
.pad.playing .progress-bar { animation: prog var(--dur,3s) linear forwards; }
@keyframes prog { from{transform:scaleX(0)} to{transform:scaleX(1)} }

#wrap { position: relative; }
#drop-overlay {
  display: none; position: absolute; inset: 0;
  background: rgba(232,160,48,0.05);
  border: 1px dashed var(--amber2);
  z-index: 50;
  align-items: center; justify-content: center;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 12px; letter-spacing: 0.14em;
  color: var(--amber); pointer-events: none;
  border-radius: var(--radius);
}
#drop-overlay.show { display: flex; }

#rename-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.72); z-index: 200; align-items: center; justify-content: center; }
#rename-overlay.show { display: flex; }
#rename-box { background: var(--bg2); border-radius: var(--radius-lg); border: 1px solid var(--line2); padding: 22px 24px; width: 280px; display: flex; flex-direction: column; gap: 14px; box-shadow: 0 28px 60px rgba(0,0,0,0.7); }
#rename-box h3 { font-family: 'IBM Plex Mono', monospace; font-size: 11px; font-weight: 600; letter-spacing: 0.14em; text-transform: uppercase; color: var(--text2); }
#rename-input { font-family: 'DM Sans', sans-serif; font-size: 14px; padding: 9px 12px; border-radius: 6px; border: 1px solid var(--line2); background: var(--bg4); color: var(--text); outline: none; width: 100%; transition: border-color 0.15s; }
#rename-input:focus { border-color: var(--amber2); }
.modal-btns { display: flex; gap: 8px; justify-content: flex-end; }

#loading-msg { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--text3); padding: 0 0 14px; letter-spacing: 0.06em; display: none; }

#footer { border-top: 1px solid var(--line); padding: 12px 28px; display: flex; align-items: center; gap: 14px; }
.vu-group { display: flex; align-items: flex-end; gap: 2px; height: 16px; }
.vu-bar { width: 3px; border-radius: 1px; background: var(--bg4); }
#footer-note { font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: var(--text3); letter-spacing: 0.06em; margin-left: auto; }

input[type=file] { display: none; }
</style>
</head>
<body>

<div id="header">
  <div id="logo">Soundboard<span>Pro Edition</span></div>
  <div id="on-air">
    <div id="on-air-dot"></div>
    <span id="on-air-text">Standby</span>
  </div>
</div>

<div id="main">
  <div id="controls">
    <button class="btn primary" id="load-btn">+ Load sounds</button>
    <button class="btn stop" id="stop-all-btn">&#9632; Stop all</button>
    <div id="vol-group">
      <label>Vol</label>
      <input type="range" id="vol-slider" min="0" max="100" value="80" step="1">
      <span id="vol-out">80%</span>
    </div>
    <div id="status-bar"></div>
  </div>
  <div id="section-label">Pads</div>
  <div id="loading-msg">Restoring saved sounds...</div>
  <div id="wrap">
    <div id="grid"></div>
    <div id="drop-overlay">DROP AUDIO FILES</div>
  </div>
</div>

<div id="footer">
  <div class="vu-group" id="vu-left"></div>
  <div class="vu-group" id="vu-right"></div>
  <div id="footer-note">36 pads &nbsp;·&nbsp; keyboard triggered &nbsp;·&nbsp; persists on refresh</div>
</div>

<div id="rename-overlay">
  <div id="rename-box">
    <h3>Rename pad</h3>
    <input type="text" id="rename-input" maxlength="32" />
    <div class="modal-btns">
      <button class="btn" id="rename-cancel">Cancel</button>
      <button class="btn primary" id="rename-ok">Save</button>
    </div>
  </div>
</div>

<input type="file" id="file-input" accept="audio/*" multiple>

<script>
(function(){
  const KEYS = 'qwertyuiopasdfghjklzxcvbnm1234567890'.split('');
  const MAX_PADS = 36;
  const DB_NAME = 'soundboard_db';
  const DB_VERSION = 2;
  const STORE_NAME = 'pads';

  const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  const masterGain = audioCtx.createGain();
  const analyserL = audioCtx.createAnalyser();
  const analyserR = audioCtx.createAnalyser();
  analyserL.fftSize = 32; analyserR.fftSize = 32;
  const splitter = audioCtx.createChannelSplitter(2);
  masterGain.gain.value = 0.8;
  masterGain.connect(splitter);
  try { splitter.connect(analyserL, 0); splitter.connect(analyserR, 1); } catch(e) {}
  masterGain.connect(audioCtx.destination);

  let db = null;
  let pads = KEYS.map(k => ({ key: k, name: null, buffer: null, rawBuffer: null, duration: 0, source: null, playing: false, wavePoints: null, pauseOffset: 0, pauseStart: 0, padMode: 'play' }));
  let renamePadIndex = -1;
  let statusTimer = null;
  let dragCount = 0;

  const grid = document.getElementById('grid');
  const fileInput = document.getElementById('file-input');
  const loadBtn = document.getElementById('load-btn');
  const stopAllBtn = document.getElementById('stop-all-btn');
  const volSlider = document.getElementById('vol-slider');
  const volOut = document.getElementById('vol-out');
  const statusBar = document.getElementById('status-bar');
  const dropOverlay = document.getElementById('drop-overlay');
  const renameOverlay = document.getElementById('rename-overlay');
  const renameInput = document.getElementById('rename-input');
  const renameCancelBtn = document.getElementById('rename-cancel');
  const renameOkBtn = document.getElementById('rename-ok');
  const loadingMsg = document.getElementById('loading-msg');
  const wrap = document.getElementById('wrap');
  const onAirDot = document.getElementById('on-air-dot');
  const onAirText = document.getElementById('on-air-text');
  const onAirEl = document.getElementById('on-air');
  const vuLeft = document.getElementById('vu-left');
  const vuRight = document.getElementById('vu-right');

  const VU_BARS = 10;
  for (let i = 0; i < VU_BARS; i++) {
    const bl = document.createElement('div'); bl.className = 'vu-bar'; bl.style.height = (4 + i*1.2)+'px'; vuLeft.appendChild(bl);
    const br = document.createElement('div'); br.className = 'vu-bar'; br.style.height = (4 + i*1.2)+'px'; vuRight.appendChild(br);
  }

  function animateVU() {
    requestAnimationFrame(animateVU);
    const dataL = new Uint8Array(analyserL.frequencyBinCount);
    const dataR = new Uint8Array(analyserR.frequencyBinCount);
    analyserL.getByteFrequencyData(dataL);
    analyserR.getByteFrequencyData(dataR);
    const avgL = dataL.reduce((a,b)=>a+b,0)/dataL.length/255;
    const avgR = dataR.reduce((a,b)=>a+b,0)/dataR.length/255;
    const barsL = vuLeft.children;
    const barsR = vuRight.children;
    for (let i = 0; i < VU_BARS; i++) {
      const t = i/(VU_BARS-1);
      const color = t>0.8 ? '#d94040' : t>0.6 ? '#e8a030' : '#2db87a';
      barsL[i].style.background = t<=avgL*1.5 ? color : 'rgba(255,255,255,0.04)';
      barsR[i].style.background = t<=avgR*1.5 ? color : 'rgba(255,255,255,0.04)';
    }
  }
  animateVU();

  function checkOnAir() {
    const playing = pads.some(p=>p.playing);
    if (playing) { onAirDot.classList.add('active'); onAirText.textContent='On Air'; onAirEl.classList.add('active'); }
    else { onAirDot.classList.remove('active'); onAirText.textContent='Standby'; onAirEl.classList.remove('active'); }
  }

  function openDB() {
    return new Promise((resolve,reject) => {
      const req = indexedDB.open(DB_NAME, DB_VERSION);
      req.onupgradeneeded = e => {
        const d = e.target.result;
        if (!d.objectStoreNames.contains(STORE_NAME)) d.createObjectStore(STORE_NAME,{keyPath:'index'});
      };
      req.onsuccess = e => resolve(e.target.result);
      req.onerror = e => reject(e);
    });
  }

  async function savePad(i) {
    if (!db || !pads[i].buffer || !pads[i].rawBuffer) return;
    const record = {index:i, name:pads[i].name, duration:pads[i].duration, rawBuffer:pads[i].rawBuffer, wavePoints:pads[i].wavePoints, padMode:pads[i].padMode};
    return new Promise(resolve => { const tx=db.transaction(STORE_NAME,'readwrite'); tx.objectStore(STORE_NAME).put(record); tx.oncomplete=resolve; tx.onerror=resolve; });
  }

  async function deletePad(i) {
    if (!db) return;
    return new Promise(resolve => { const tx=db.transaction(STORE_NAME,'readwrite'); tx.objectStore(STORE_NAME).delete(i); tx.oncomplete=resolve; tx.onerror=resolve; });
  }

  async function restoreAll() {
    if (!db) return;
    loadingMsg.style.display='block';
    return new Promise(resolve => {
      const tx=db.transaction(STORE_NAME,'readonly');
      const req=tx.objectStore(STORE_NAME).getAll();
      req.onsuccess=async e=>{
        const records=e.target.result||[];
        let loaded=0;
        for (const rec of records) {
          const i=rec.index;
          if(i<0||i>=MAX_PADS) continue;
          try {
            const ab=await audioCtx.decodeAudioData(rec.rawBuffer.slice(0));
            pads[i].buffer=ab; pads[i].rawBuffer=rec.rawBuffer; pads[i].name=rec.name; pads[i].duration=rec.duration; pads[i].wavePoints=rec.wavePoints; pads[i].padMode=rec.padMode||'play'; loaded++;
          } catch(err){}
        }
        loadingMsg.style.display='none';
        if(loaded>0) showStatus('Restored '+loaded+' sound'+(loaded>1?'s':''));
        render(); resolve();
      };
      req.onerror=()=>{loadingMsg.style.display='none';render();resolve();};
    });
  }

  function showStatus(msg, dur=2200) {
    statusBar.textContent=msg; statusBar.classList.add('visible');
    clearTimeout(statusTimer);
    statusTimer=setTimeout(()=>statusBar.classList.remove('visible'),dur);
  }

  function formatDur(s) {
    if(!s) return '';
    const m=Math.floor(s/60),sec=Math.floor(s%60);
    return m>0?m+':'+String(sec).padStart(2,'0'):sec+'s';
  }

  function buildWavePoints(buffer,samples=80) {
    const data=buffer.getChannelData(0);
    const step=Math.floor(data.length/samples);
    const pts=[];
    for(let i=0;i<samples;i++){
      let max=0;
      for(let j=0;j<step;j++){const v=Math.abs(data[i*step+j]||0);if(v>max)max=v;}
      pts.push(max);
    }
    const peak=Math.max(...pts,0.01);
    return pts.map(v=>v/peak);
  }

  function drawWave(canvas, pts, playing) {
    const W=canvas.offsetWidth||140, H=28;
    const dpr=window.devicePixelRatio||1;
    canvas.width=W*dpr; canvas.height=H*dpr;
    canvas.style.width=W+'px'; canvas.style.height=H+'px';
    const c=canvas.getContext('2d');
    c.scale(dpr,dpr);
    c.clearRect(0,0,W,H);
    const barW=Math.max(1.2,(W/pts.length)-0.8);
    const mid=H/2;
    pts.forEach((v,i)=>{
      const h=Math.max(1,v*mid*0.9);
      const x=i*(W/pts.length);
      c.fillStyle=playing?'#e8a030':`rgba(140,135,128,${0.2+v*0.6})`;
      c.fillRect(x,mid-h,barW,h*2);
    });
  }

  function render() {
    grid.innerHTML='';
    pads.forEach((pad,i)=>{
      const el=document.createElement('div');
      el.className='pad'+(pad.buffer?'':' empty')+(pad.playing?' playing':'');
      if(pad.playing&&pad.duration>0) el.style.setProperty('--dur',pad.duration+'s');

      const top=document.createElement('div'); top.className='pad-top';
      const keyEl=document.createElement('div'); keyEl.className='pad-key'; keyEl.textContent=pad.key.toUpperCase();
      const nameEl=document.createElement('div'); nameEl.className='pad-name'+(pad.buffer?'':' unloaded'); nameEl.textContent=pad.buffer?pad.name:'empty';
      top.append(keyEl,nameEl); el.appendChild(top);

      if(pad.buffer&&pad.wavePoints){
        const canvas=document.createElement('canvas'); canvas.className='pad-wave'; canvas.style.width='100%'; canvas.height=28;
        el.appendChild(canvas);
        requestAnimationFrame(()=>drawWave(canvas,pad.wavePoints,pad.playing));
      }

      const bottom=document.createElement('div'); bottom.className='pad-bottom';
      const durEl=document.createElement('div'); durEl.className='pad-duration'; durEl.textContent=pad.buffer?formatDur(pad.duration):'';
      const actEl=document.createElement('div'); actEl.className='pad-actions';

      if(pad.buffer){
        const pill=document.createElement('div'); pill.className='pad-mode-pill';
        const playOpt=document.createElement('button'); playOpt.className='pad-mode-opt'+(pad.padMode==='play'?' active':''); playOpt.textContent='Play';
        const sep=document.createElement('div'); sep.className='pad-mode-sep';
        const pauseOpt=document.createElement('button'); pauseOpt.className='pad-mode-opt'+(pad.padMode==='pause'?' active':''); pauseOpt.textContent='Pause';
        playOpt.addEventListener('click',e=>{e.stopPropagation();setPadMode(i,'play');});
        pauseOpt.addEventListener('click',e=>{e.stopPropagation();setPadMode(i,'pause');});
        pill.append(playOpt,sep,pauseOpt);
        const renBtn=document.createElement('button'); renBtn.className='pad-btn'; renBtn.textContent='rename';
        renBtn.addEventListener('click',e=>{e.stopPropagation();openRename(i);});
        const delBtn=document.createElement('button'); delBtn.className='pad-btn del'; delBtn.textContent='clear';
        delBtn.addEventListener('click',e=>{e.stopPropagation();clearPad(i);});
        actEl.append(pill,renBtn,delBtn);
        const prog=document.createElement('div'); prog.className='progress-bar'; el.appendChild(prog);
        el.addEventListener('click',()=>triggerPad(i));
      } else {
        const addBtn=document.createElement('button'); addBtn.className='pad-btn'; addBtn.textContent='+ load';
        addBtn.addEventListener('click',e=>{e.stopPropagation();loadForPad(i);});
        actEl.appendChild(addBtn);
      }
      bottom.append(durEl,actEl); el.appendChild(bottom);
      grid.appendChild(el);
    });
  }

  async function setPadMode(i, m) {
    pads[i].padMode = m;
    if (m === 'play' && pads[i].playing) { pausePad(i); pads[i].pauseOffset = 0; }
    await savePad(i);
    render();
  }

  function startPad(i, offset) {
    const pad = pads[i];
    if (audioCtx.state === 'suspended') audioCtx.resume();
    if (pad.source) { try { pad.source.stop(); } catch(e){} pad.source = null; }
    const src = audioCtx.createBufferSource();
    src.buffer = pad.buffer; src.connect(masterGain); src.start(0, offset || 0);
    pad.source = src; pad.playing = true; pad.pauseStart = audioCtx.currentTime - (offset || 0);
    src.onended = () => { if (pad.source === src) { pad.playing = false; pad.source = null; pad.pauseOffset = 0; checkOnAir(); render(); } };
  }

  function stopPad(i) {
    const pad = pads[i];
    if (pad.source) { try { pad.source.stop(); } catch(e){} pad.source = null; }
    pad.playing = false; pad.pauseOffset = 0;
  }

  function pausePad(i) {
    const pad = pads[i];
    if (!pad.playing || !pad.source) return;
    const elapsed = audioCtx.currentTime - pad.pauseStart;
    pad.pauseOffset = elapsed % pad.duration;
    try { pad.source.stop(); } catch(e){}
    pad.source = null; pad.playing = false;
  }

  function triggerPad(i) {
    const pad = pads[i];
    if (!pad.buffer) return;
    if (pad.padMode === 'play') {
      startPad(i, 0);
      showStatus('▶  ' + pad.name.toUpperCase());
    } else {
      if (pad.playing) {
        pausePad(i);
        showStatus('⏸  ' + pad.name.toUpperCase());
      } else {
        startPad(i, pad.pauseOffset || 0);
        showStatus('▶  ' + pad.name.toUpperCase());
      }
    }
    checkOnAir(); render();
  }

  async function clearPad(i) {
    const pad=pads[i];
    stopPad(i);
    pad.buffer=null;pad.rawBuffer=null;pad.name=null;pad.duration=0;pad.wavePoints=null;pad.pauseOffset=0;
    await deletePad(i); checkOnAir(); render();
  }

  function openRename(i) {
    renamePadIndex=i; renameInput.value=pads[i].name||'';
    renameOverlay.classList.add('show'); renameInput.focus(); renameInput.select();
  }

  renameCancelBtn.addEventListener('click',()=>renameOverlay.classList.remove('show'));
  renameOkBtn.addEventListener('click',async()=>{
    if(renamePadIndex>=0&&renameInput.value.trim()){pads[renamePadIndex].name=renameInput.value.trim();await savePad(renamePadIndex);}
    renameOverlay.classList.remove('show'); render();
  });
  renameInput.addEventListener('keydown',e=>{if(e.key==='Enter')renameOkBtn.click();if(e.key==='Escape')renameCancelBtn.click();});

  function loadForPad(i) {
    const tmp=document.createElement('input'); tmp.type='file'; tmp.accept='audio/*';
    tmp.addEventListener('change',e=>{if(e.target.files[0])loadFile(e.target.files[0],i);});
    tmp.click();
  }

  async function loadFile(file,padIndex) {
    const reader=new FileReader();
    reader.onload=async e=>{
      try{
        const raw=e.target.result;
        const buf=await audioCtx.decodeAudioData(raw.slice(0));
        pads[padIndex].buffer=buf; pads[padIndex].rawBuffer=raw; pads[padIndex].duration=buf.duration;
        pads[padIndex].name=file.name.replace(/\.[^.]+$/,'');
        pads[padIndex].wavePoints=buildWavePoints(buf);
        await savePad(padIndex);
        showStatus('Loaded → '+pads[padIndex].key.toUpperCase()); render();
      }catch(err){showStatus('Error loading file');}
    };
    reader.readAsArrayBuffer(file);
  }

  async function loadFiles(files) {
    let nextEmpty=pads.findIndex(p=>!p.buffer);
    let count=0;
    for(const file of files){
      if(nextEmpty<0||nextEmpty>=MAX_PADS) break;
      await new Promise(resolve=>{
        const reader=new FileReader();
        reader.onload=async e=>{
          try{
            const raw=e.target.result;
            const buf=await audioCtx.decodeAudioData(raw.slice(0));
            pads[nextEmpty].buffer=buf; pads[nextEmpty].rawBuffer=raw; pads[nextEmpty].duration=buf.duration;
            pads[nextEmpty].name=file.name.replace(/\.[^.]+$/,'');
            pads[nextEmpty].wavePoints=buildWavePoints(buf);
            await savePad(nextEmpty); count++;
            const prev=nextEmpty; nextEmpty=pads.findIndex((p,idx)=>!p.buffer&&idx>prev);
          }catch(e){}
          resolve();
        };
        reader.readAsArrayBuffer(file);
      });
    }
    render(); showStatus('Loaded '+count+' sound'+(count>1?'s':''));
  }

  loadBtn.addEventListener('click',()=>fileInput.click());
  fileInput.addEventListener('change',e=>{if(e.target.files.length)loadFiles(Array.from(e.target.files));fileInput.value='';});
  stopAllBtn.addEventListener('click',()=>{
    pads.forEach((_,i)=>stopPad(i));
    checkOnAir(); render();
  });
  volSlider.addEventListener('input',()=>{
    const v=parseInt(volSlider.value);
    masterGain.gain.value=v/100; volOut.textContent=v+'%';
  });
  document.addEventListener('keydown',e=>{
    if(e.target.tagName==='INPUT') return;
    const key=e.key.toLowerCase();
    const i=KEYS.indexOf(key);
    if(i>=0&&pads[i].buffer){e.preventDefault();triggerPad(i);}
  });

  wrap.addEventListener('dragenter',e=>{e.preventDefault();dragCount++;dropOverlay.classList.add('show');});
  wrap.addEventListener('dragleave',()=>{dragCount--;if(dragCount<=0){dragCount=0;dropOverlay.classList.remove('show');}});
  wrap.addEventListener('dragover',e=>e.preventDefault());
  wrap.addEventListener('drop',e=>{
    e.preventDefault();dragCount=0;dropOverlay.classList.remove('show');
    const files=Array.from(e.dataTransfer.files).filter(f=>f.type.startsWith('audio/'));
    if(files.length) loadFiles(files);
  });

  openDB().then(database=>{db=database;restoreAll();}).catch(()=>{render();showStatus('Storage unavailable',3000);});
})();
</script>
</body>
</html>
